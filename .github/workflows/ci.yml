name: CI

# Antes deste workflow, nada rodava os testes automaticamente em push/PR -- dependia de
# alguém lembrar de rodar localmente (achado de auditoria, 2026-07-13/14). Sem Postgres/Mongo
# reais aqui de propósito: os testes automatizados já usam SQLite + mongomock-motor (ver
# docs/BACKEND.md), então não precisam de serviço nenhum pra rodar em CI.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl oletools numpy msoffcrypto-tool
          pip install -r backend/requirements.txt
      - name: Rodar testes (161 -> 164 desde a auditoria de segurança)
        run: python -m unittest discover -s tests -q

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npx oxlint src
      - name: Testes
        run: npm run test
      - name: Build de produção
        run: npm run build
