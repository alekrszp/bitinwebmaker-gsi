# Serve o bundle estático (React Router client-side -- qualquer rota desconhecida cai em
# index.html, senão um refresh em "/bitins/123" devolve 404 do nginx em vez de deixar o
# React Router decidir) + proxy reverso de /api/ pro serviço "backend" do Compose (nome de
# serviço resolve via DNS interno do Docker -- não é "localhost", é a rede do próprio Compose).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com hash no nome (Vite já versiona por conteúdo) podem cachear "pra sempre" --
    # index.html NUNCA (senão o navegador não pega deploy novo até o cache expirar sozinho).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
